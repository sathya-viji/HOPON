# HopOn — Supabase local development configuration
# Source of truth: hopon-backend-execution.md v1.0 (frozen)
# This file configures the LOCAL stack only. Production settings are managed
# in the Supabase dashboard / CLI for project ref set in .env (SUPABASE_PROJECT_REF).

project_id = "hopon"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public"]
# Hard cap on rows per request — pagination is mandatory in clients.
max_rows = 100

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

# Local email testing (not used in production — phone OTP only per D1)
[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "10MiB"

[storage.buckets.avatars]
public = true
file_size_limit = "5MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp"]

[storage.buckets.recaps]
public = true
file_size_limit = "5MiB"   # 5 MB per image (Phase 5 media decision)
allowed_mime_types = ["image/jpeg", "image/png", "image/webp"]

[storage.buckets.stories]
public = true
file_size_limit = "10MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp"]

[auth]
enabled = true
site_url = "hopon://"
additional_redirect_urls = ["hopon://auth-callback"]
jwt_expiry = 3600                 # 1h access token (frozen)
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.sms]
enable_signup = true
enable_confirmations = true
# OTP limits per frozen spec: 5 sends / 10 min / phone, 3 attempts per OTP.
max_frequency = "2m0s"

# Local dev: a Twilio provider must be DECLARED for GoTrue to enable phone auth
# at all (otherwise GOTRUE_EXTERNAL_PHONE_ENABLED=false). The creds are dummy —
# the test_otp numbers below short-circuit inside GoTrue and never hit Twilio,
# so no real SMS is sent locally. Production sets real creds via dashboard secrets.
[auth.sms.twilio]
enabled = true
account_sid = "AC_local_dummy"
message_service_sid = "MG_local_dummy"
auth_token = "local_dummy"

# Fixed OTPs for the dev test numbers (no real SMS).
#   ...91/92/93 map to seeded profiles u0/u1/u2 → verify routes to Main.
#   ...00 has NO seeded profile → GoTrue creates a fresh user → routes to
#       onboarding (SignupName) so the new-user flow is testable locally.
[auth.sms.test_otp]
"+919999999991" = "123451"
"+919999999992" = "123452"
"+919999999993" = "123453"
"+919999999900" = "123450"

[auth.rate_limit]
sms_sent = 5                      # per 10-minute window

[analytics]
enabled = false

[edge_runtime]
enabled = true
policy = "oneshot"                # local dev: reload functions on each request
